# fly.toml app configuration file generated for orca-shipnoise on 2025-12-09T00:52:39-08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'orca-shipnoise-sjdtow'
primary_region = 'sjc'

[build]
  dockerfile = "Dockerfile.backend"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1
