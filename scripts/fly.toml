# fly.toml — AIS collection & processing worker
# Deploy: fly deploy --config scripts/fly.toml

app = 'orca-shipnoise-worker'
primary_region = 'sjc'

[build]
  dockerfile = "scripts/Dockerfile"

[processes]
  worker = "python -u scripts/run_pipeline.py"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  processes = ['worker']
